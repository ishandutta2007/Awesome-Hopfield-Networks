<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="800" height="200" fill="url(#grad1)" rx="10" />
  
  <!-- Abstract Neural Patterns -->
  <circle cx="100" cy="60" r="3" fill="#38bdf8" opacity="0.4" />
  <circle cx="150" cy="140" r="4" fill="#38bdf8" opacity="0.6" />
  <circle cx="650" cy="40" r="3" fill="#38bdf8" opacity="0.4" />
  <circle cx="720" cy="160" r="5" fill="#38bdf8" opacity="0.5" />
  <line x1="100" y1="60" x2="150" y2="140" stroke="#38bdf8" stroke-width="1" opacity="0.2" />
  <line x1="650" y1="40" x2="720" y2="160" stroke="#38bdf8" stroke-width="1" opacity="0.2" />
  
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#f8fafc" filter="url(#glow)">
    Hopfield Networks
  </text>
  <text x="50%" y="70%" dominant-baseline="middle" text-anchor="middle" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#94a3b8" letter-spacing="2">
    ASSOCIATIVE MEMORY • ENERGY LANDSCAPES
  </text>
</svg>